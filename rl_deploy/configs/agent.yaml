seed: 42
device: cuda:0
num_steps_per_env: 24
max_iterations: 50000
empirical_normalization: null
obs_groups:
  policy:
  - policy
  critic:
  - policy
clip_actions: null
save_interval: 100
experiment_name: spot_flat_v2
run_name: ''
logger: tensorboard
neptune_project: isaaclab
wandb_project: isaaclab
resume: false
load_run: .*
load_checkpoint: model_.*.pt
class_name: OnPolicyRunner
policy:
  class_name: ActorCritic
  init_noise_std: 1.0
  noise_std_type: scalar
  actor_obs_normalization: false
  critic_obs_normalization: false
  actor_hidden_dims:
  - 512
  - 256
  - 128
  critic_hidden_dims:
  - 512
  - 256
  - 128
  activation: elu
algorithm:
  class_name: PPO
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 0.001
  schedule: adaptive
  gamma: 0.99
  lam: 0.95
  entropy_coef: 0.0025
  desired_kl: 0.01
  max_grad_norm: 1.0
  value_loss_coef: 0.5
  use_clipped_value_loss: true
  clip_param: 0.2
  normalize_advantage_per_mini_batch: false
  rnd_cfg: null
  symmetry_cfg:
    use_data_augmentation: true
    use_mirror_loss: false
    data_augmentation_func: isaaclab_experiments.spot_low_level.configs.observation:left_right_symmetry_obs
    mirror_loss_coeff: 0.0
store_code_state: false
